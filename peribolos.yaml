orgs:
  complytime:
    name: complytime
    default_repository_permission: read
    has_organization_projects: true
    has_repository_projects: true
    members_can_create_repositories: true
    admins:
      - jflowers
      - jpower432
      - marcusburghardt
    members:
      - anuagarw
      - au-der
      - beatrizmcouto
      - benroose
      - bplaxco
      - eeasley2014
      - fkolacek-rh
      - fortiz-ai
      - gvauter
      - hbraswelrh
      - jamimoor
      - JenniferPrivette
      - jiprocha
      - jpadmanrh
      - nladha09
      - phoward-rh
      - ppsomiad
      - rbaratam-psc
      - rhaml-23
      - rmonk-redhat
      - sonupreetam
      - trevor-vaughan
      - vojtapolasek
    repos:
      ".github":
        default_branch: main
        description: A repository to apply peribolos to manage organization complytime.
        has_projects: true
      "community":
        default_branch: main
        description: Community-related documents for the ComplyTime project.
        has_projects: true
      "complyctl":
        default_branch: main
        description: A command-line tool for streamlining end-to-end compliance workflows on local systems.
        has_projects: true
      "complyscribe":
        default_branch: main
        description: A workflow automation tool for compliance content authoring
        has_projects: true
      "complytime":
        default_branch: main
        description: Repository for complytime releases
        has_projects: true
      "complytime-collector-components":
        default_branch: main
        description: A policy-driven observability toolkit for compliance evidence collection
        has_projects: true
      "complytime-demos":
        default_branch: main
        description: A repository to hold automation and examples used to demo ComplyTime features.
        has_projects: true
      "complytime-providers":
        default_branch: main
        description: complyctl providers (formerly plugins)
        has_projects: true
      "complytime-policies":
        default_branch: main
        description: Repository for complytime engineering policies expressed in Gemara
        has_projects: true
      "gemara-content-service":
        default_branch: main
        description: A content delivery and enrichment service for Gemara compliance artifacts.
        has_projects: true
      "org-infra":
        default_branch: main
        description: Repository for reusable workflows, shared configurations, and templates used in ComplyTime org.
        has_projects: true
      "website":
        default_branch: main
        description: The ComplyTime website
        has_projects: true
      "complypack":
        default_branch: main
        description: Assessment logic packaging for complyctl
        has_projects: true
    teams:
      security-managers:
        description: Enterprise security manager team
        privacy: closed
        members:
          - bplaxco
      community-managers:
        description: Community managers who handle labels, reviews, and issue triage without write access
        privacy: closed
        members:
          - beatrizmcouto
          - hbraswelrh
          - sonupreetam
        repos:
          ".github": triage
          community: triage
          complyctl: triage
          complypack: triage
          complyscribe: triage
          complytime: triage
          complytime-collector-components: triage
          complytime-demos: triage
          complytime-policies: triage
          complytime-providers: triage
          gemara-content-service: triage
          org-infra: triage
          website: triage
      complytime-approvers:
        description: Write access to non-code repos for project stakeholders
        privacy: closed
        maintainers:
          - jflowers
          - jpower432
          - marcusburghardt
        members:
          - beatrizmcouto
          - hbraswelrh
        repos:
          community: write
          complytime-demos: write
          website: write
      ampel-provider-approvers:
        description: CODEOWNERS group for ampel-provider in complytime-providers
        privacy: closed
        maintainers:
          - jpower432
          - marcusburghardt
        members:
          - gvauter
          - hbraswelrh
          - sonupreetam
          - trevor-vaughan
