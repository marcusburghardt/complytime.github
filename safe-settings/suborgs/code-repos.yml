# Suborg: code repositories.
# These repos contain source code and require strict security controls:
# required code owner reviews, required status checks, and stale review
# dismissal.
#
# Org-wide defaults from settings.yml are inherited automatically.
# Only override settings here if code repos need different values
# than the org-wide defaults.
#
# Excluded: complyscribe (archived), gemara-content-service (archival pending)

suborgrepos:
  - complyctl
  - complypack
  - complytime-collector-components
  - complytime-policies
  - complytime-providers
  - org-infra
