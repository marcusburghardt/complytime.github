# Deployment settings for github/safe-settings.
# Controls which repos are managed and defines validation policies.
#
# This file is read at runtime via the DEPLOYMENT_CONFIG_FILE env var.
# See: https://github.com/github/safe-settings

# Repositories excluded from safe-settings management.
# The .github repo is excluded to avoid circular dependency (it hosts
# the safe-settings config). Its ruleset is managed manually via the
# GitHub UI.
restrictedRepos:
  exclude:
    - .github
    - admin
    - safe-settings

# Config validators run against each config entry before applying.
# Return true to allow, false to reject.
configvalidators:
  - plugin: collaborators
    error: |
      Admin permission cannot be granted to collaborators via safe-settings.
      Use peribolos team membership with admin role instead.
    script: |
      return baseconfig.permission != 'admin'

# Override validators run when a suborg or repo config overrides an
# org-level setting. Return true to allow, false to reject.
overridevalidators:
  - plugin: branches
    error: |
      Branch protection required_approving_review_count cannot be lowered
      below the org-level default. Contact an org admin to request an
      exception.
    script: |
      const baseCount = baseconfig?.protection?.required_pull_request_reviews?.required_approving_review_count
      const overrideCount = overrideconfig?.protection?.required_pull_request_reviews?.required_approving_review_count
      if (baseCount && overrideCount) {
        return overrideCount >= baseCount
      }
      return true
